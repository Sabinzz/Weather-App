<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Practise.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <input  class=" searchbox" type="text" placeholder="Enter city name">
            <button class="searchbtn">
                <img src="search.png" alt="">
            </button>
        </div>
        <div class="weatherupdate">
            <img src="clouds.png" alt="">
            <div class="temp">
                <h1>10°C</h1>
                <p class="cityname">Pokhara</p>
            </div>
            <div class="footer">

                <div class="humidity">
                    <img src="humidity.png" alt="">
                    <div class="text">

                        <h3 class="humidtext">49%</h3>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="wind">
                    <img src="wind.png" alt="">
                    <div class="text">

                        <h3 class="windtext">2km/hr</h3>
                        <p>wind speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script src="Practise.js"></script>
</body>
</html>
